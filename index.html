<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pokémon Explorer</title>
  </head>

  <body>
    <!-- Kontrollpanel for søk og filtre -->
    <div class="controls">
      <!-- Søkefelt -->
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Søk etter en by eller sted...">
        <button id="search-btn">Søk</button>
      </div>

      <!-- Filterknapper -->
      <div class="filter-container">
        <button class="filter-btn" data-category="amenity">Vis Alle</button>
        <button class="filter-btn" data-category="catering.restaurant,catering.cafe">Pokémon Cafés</button>
        <button class="filter-btn" data-category="leisure.park">Wild Areas</button>
        <button class="filter-btn" data-category="tourism.hotel">Pokémon Centers</button>
      </div>
    </div>

    <!-- Tvinger kartet til å ha en synlig høyde på 600 piksler direkte på elementet -->
    <div id="map" style="height: 600px; width: 100%; display: block !important;"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
