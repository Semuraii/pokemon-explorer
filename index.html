<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokémon Explorer</title>
  </head>

  <body>

    <header class="header">
        <h1>⚡ Pokémon Explorer ⚡</h1>
        <p>Discover Pokémon around the world!</p>
    </header>

    

    <!-- Kontrollpanel for søk og filtre -->
    <div class="controls">
      <!-- Søkefelt -->
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Søk etter en by eller sted...">
        <button id="search-btn">Søk</button>
      </div>
    </div>

<div class="content">

    <div class="map-container">
    <div id="map"></div>
</div>

 <button id="pokedex-toggle">
        📖
    </button>

   <aside class="pokedex">

<div class="pokedex-header">

    <div class="light red"></div>

    <div class="light yellow"></div>

    <div class="light green"></div>

    <h2 class="pokedex-title">
        Pokédex
    </h2>

</div>

<div class="progress-section">

    <p id="caught-counter">Caught Pokémon: 0 / 151</p>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <p id="progress-percent">0%</p>

</div>

<hr>

<div class="pokedex-screen">

    <div id="pokemon-display">

        <p>No Pokémon caught yet.</p>

    </div>

</div>

<h3 class="collection-title">Collection</h3>

<div id="pokemon-collection"></div>

</aside>

</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
